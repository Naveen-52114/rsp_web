<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | RPS E-Bookstore</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo" style="cursor:pointer;" onclick="window.location.href='index.html'">
            <i class="fas fa-book-open"></i> RPS<span>Bookstore</span>
        </div>
        <div class="nav-links">
            <a href="login.html">Sign In</a>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div style="width:70px; height:70px; border-radius:50%; background:rgba(253,121,168,0.1); border:2px solid var(--accent); display:flex; align-items:center; justify-content:center; margin:0 auto 1.5rem; font-size:1.8rem; color:var(--accent);">
                    <i class="fas fa-key"></i>
                </div>
                <h1>Forgot Password</h1>
                <p>Enter your email and we'll log a secure reset link to the server terminal</p>
            </div>

            <div id="successState" style="display:none; text-align:center; padding:1rem 0;">
                <div style="width:70px; height:70px; border-radius:50%; background:rgba(0,184,148,0.1); border:2px solid var(--success); display:flex; align-items:center; justify-content:center; margin:0 auto 1.5rem; font-size:1.8rem; color:var(--success);">
                    <i class="fas fa-check"></i>
                </div>
                <h3 style="margin-bottom:0.8rem; color:var(--success);">Request Sent!</h3>
                <p style="color:#a0a0b0; margin-bottom:2rem;">Check the server terminal console for the reset link. It will expire in 1 hour.</p>
                <a href="login.html" class="btn-primary" style="display:inline-block;">Back to Sign In</a>
            </div>

            <form id="forgotForm">
                <div class="form-group">
                    <label for="email">Registered Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <button type="submit" class="btn-primary auth-btn" id="forgotBtn" style="background: linear-gradient(135deg, var(--accent), var(--primary)); box-shadow: 0 4px 15px rgba(253,121,168,0.3);">
                    <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>
            </form>

            <div class="auth-footer">
                Remember your password? <a href="login.html">Sign In</a>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('forgotBtn');
            const email = document.getElementById('email').value.trim();

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();

                if (response.ok) {
                    document.getElementById('forgotForm').style.display = 'none';
                    document.getElementById('successState').style.display = 'block';
                    document.querySelector('.auth-footer').style.display = 'none';
                } else {
                    showToast(data.message || "Request failed.", "error");
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
                }
            } catch (err) {
                showToast("Could not connect to server.", "error");
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
            }
        });
    </script>
</body>
</html>
