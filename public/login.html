<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | RPS E-Bookstore</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <nav>
        <div class="logo" style="cursor:pointer;" onclick="window.location.href='index.html'">
            <img src="logo.png" alt="RPS Logo" style="height: 50px; max-height: 50px;" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <span style="display: none;">Research <span>Publishing</span></span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to access your purchased e-books</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div style="text-align:right; margin-top:-0.8rem; margin-bottom:1.5rem;">
                    <a href="forgot-password.html" style="color:var(--accent); font-size:0.9rem; font-weight:500;">Forgot Password?</a>
                </div>
                <button type="submit" class="btn-primary auth-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div class="oauth-divider">or continue with</div>

            <div class="google-btn-container">
                <div id="googleBtn"></div>
            </div>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign Up Now</a>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const response = await handleEmailLogin(email, password);
            if (response.success) {
                showToast("Login successful! Redirecting...", "success");
                setTimeout(() => {
                    if (response.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }, 1200);
            } else {
                showToast(response.message || "Failed to login. Please try again.", "error");
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            }
        });
    </script>
</body>
</html>
