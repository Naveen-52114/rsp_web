<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details | RPS E-Bookstore</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo" style="cursor:pointer;" onclick="window.location.href='index.html'">
            <img src="logo.png" alt="RPS Logo" style="height: 50px; max-height: 50px;" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <span style="display: none;">Research <span>Publishing</span></span>
        </div>
        <div class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
        </div>
        <div class="nav-actions" id="navActions" style="display:flex; align-items:center; gap:1rem;">
            <a href="publish.html"><button class="btn-primary">Publish with us</button></a>
        </div>
    </nav>

    <main class="book-details-wrapper">
        <div style="max-width: 1100px; margin: 0 auto 2rem;">
            <a href="index.html" style="color: var(--primary-light); font-weight: 500; display: inline-flex; align-items: center; gap: 0.5rem;">
                <i class="fas fa-arrow-left"></i> Back to Catalog
            </a>
        </div>
        <div class="book-details-container" id="bookDetailsContainer">
            <div class="spinner-container" style="grid-column: 1 / -1;">
                <div class="spinner"></div>
            </div>
        </div>
    </main>

    <footer>
        <div class="copyright">
            <p>&copy; 2026 Research Publishing Singapore (RPS). All rights reserved.</p>
        </div>
    </footer>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/auth.js"></script>
    <script src="js/book.js"></script>
</body>
</html>
