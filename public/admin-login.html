<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal | RPS Bookstore</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav>
        <div class="logo" style="cursor:pointer;" onclick="window.location.href='index.html'">
            <i class="fas fa-book-open"></i> RPS<span>Bookstore</span>
        </div>
        <div class="nav-links">
            <a href="login.html">User Portal</a>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div style="width:70px; height:70px; border-radius:50%; background:rgba(214,48,49,0.1); border:2px solid var(--danger); display:flex; align-items:center; justify-content:center; margin:0 auto 1.5rem; font-size:1.8rem; color:var(--danger);">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h1>Admin Control Center</h1>
                <p>Authorized access only</p>
            </div>

            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="adminEmail">Admin Email</label>
                    <input type="email" id="adminEmail" class="form-control" placeholder="admin@example.com" required>
                </div>
                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <input type="password" id="adminPassword" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary auth-btn" id="adminLoginBtn" style="background: linear-gradient(135deg, var(--danger), #e17055); box-shadow: 0 4px 15px rgba(214, 48, 49, 0.4);">
                    <i class="fas fa-lock"></i> Secure Login
                </button>
            </form>

            <div class="auth-footer">
                Default: <code style="color:var(--primary-light);">admin@rpsbookstore.com</code> | <code style="color:var(--primary-light);">AdminPassWord123!</code>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('adminLoginBtn');
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';

            const response = await handleAdminLogin(email, password);
            if (response.success) {
                showToast("Admin access granted!", "success");
                setTimeout(() => { window.location.href = 'admin.html'; }, 1200);
            } else {
                showToast(response.message || "Invalid credentials.", "error");
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-lock"></i> Secure Login';
            }
        });
    </script>
</body>
</html>
